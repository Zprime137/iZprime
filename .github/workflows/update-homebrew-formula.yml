name: update-homebrew-formula

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish in the tap (for example: v1.0.1)"
        required: true
        type: string

jobs:
  update-tap:
    if: github.repository == 'Zprime137/iZprime'
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout source repository
        uses: actions/checkout@v4

      - name: Resolve release metadata
        id: meta
        env:
          EVENT_NAME: ${{ github.event_name }}
          RELEASE_TAG_RAW: ${{ github.event.release.tag_name }}
          INPUT_TAG_RAW: ${{ inputs.tag }}
        run: |
          set -euo pipefail

          if [ "$EVENT_NAME" = "release" ]; then
            TAG="$RELEASE_TAG_RAW"
          else
            TAG="$INPUT_TAG_RAW"
          fi

          if [ -z "$TAG" ]; then
            echo "::error::Missing release tag."
            exit 1
          fi

          # Allow SemVer-like tags only (vMAJOR.MINOR.PATCH with optional suffix).
          if ! printf '%s' "$TAG" | grep -Eq '^v[0-9]+(\.[0-9]+){2}([._+-][0-9A-Za-z-]+)*$'; then
            echo "::error::Invalid tag format '$TAG'. Expected vMAJOR.MINOR.PATCH (optional suffix allowed)."
            exit 1
          fi

          VERSION="${TAG#v}"
          printf 'tag=%s\n' "$TAG" >> "$GITHUB_OUTPUT"
          printf 'version=%s\n' "$VERSION" >> "$GITHUB_OUTPUT"

      - name: Compute source tarball checksum
        id: sha
        env:
          TAG: ${{ steps.meta.outputs.tag }}
          REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail
          URL="https://github.com/${REPOSITORY}/archive/refs/tags/${TAG}.tar.gz"
          curl -fsSL "$URL" -o source.tar.gz
          SHA="$(sha256sum source.tar.gz | awk '{print $1}')"
          printf 'sha256=%s\n' "$SHA" >> "$GITHUB_OUTPUT"

      - name: Update Homebrew tap formula
        env:
          TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          VERSION: ${{ steps.meta.outputs.version }}
          SHA: ${{ steps.sha.outputs.sha256 }}
        run: |
          set -euo pipefail

          if [ -z "$TAP_TOKEN" ]; then
            echo "::error::Missing HOMEBREW_TAP_TOKEN secret."
            exit 1
          fi

          if ! printf '%s' "$VERSION" | grep -Eq '^[0-9]+(\.[0-9]+){2}([._+-][0-9A-Za-z-]+)*$'; then
            echo "::error::Invalid version '$VERSION'."
            exit 1
          fi
          if ! printf '%s' "$SHA" | grep -Eq '^[0-9a-f]{64}$'; then
            echo "::error::Invalid SHA256 '$SHA'."
            exit 1
          fi

          TAP_REPO="https://x-access-token:${TAP_TOKEN}@github.com/Zprime137/homebrew-izprime.git"

          git clone "$TAP_REPO" tap
          mkdir -p tap/Formula

          sed \
            -e "s|@VERSION@|${VERSION}|g" \
            -e "s|@SHA256@|${SHA}|g" \
            packaging/homebrew/izprime.rb.in > tap/Formula/izprime.rb

          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git diff --quiet -- Formula/izprime.rb; then
            echo "Formula already up to date."
            exit 0
          fi

          git add Formula/izprime.rb
          git commit -m "izprime ${VERSION}"
          git push origin HEAD:main
