name: update-homebrew-formula

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish in the tap (for example: v1.0.1)"
        required: true
        type: string

jobs:
  update-tap:
    if: github.repository == 'Zprime137/iZprime'
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout source repository
        uses: actions/checkout@v4

      - name: Resolve release metadata
        id: meta
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            TAG="${{ github.event.release.tag_name }}"
          else
            TAG="${{ inputs.tag }}"
          fi

          if [ -z "$TAG" ]; then
            echo "::error::Missing release tag."
            exit 1
          fi

          case "$TAG" in
            v*) ;;
            *)
              echo "::error::Tag must start with 'v' (got '$TAG')."
              exit 1
              ;;
          esac

          VERSION="${TAG#v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Compute source tarball checksum
        id: sha
        run: |
          TAG="${{ steps.meta.outputs.tag }}"
          URL="https://github.com/${{ github.repository }}/archive/refs/tags/${TAG}.tar.gz"
          curl -fsSL "$URL" -o source.tar.gz
          SHA="$(sha256sum source.tar.gz | awk '{print $1}')"
          echo "sha256=$SHA" >> "$GITHUB_OUTPUT"

      - name: Update Homebrew tap formula
        env:
          TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          if [ -z "$TAP_TOKEN" ]; then
            echo "::error::Missing HOMEBREW_TAP_TOKEN secret."
            exit 1
          fi

          VERSION="${{ steps.meta.outputs.version }}"
          SHA="${{ steps.sha.outputs.sha256 }}"
          TAP_REPO="https://x-access-token:${TAP_TOKEN}@github.com/Zprime137/homebrew-izprime.git"

          git clone "$TAP_REPO" tap
          mkdir -p tap/Formula

          sed \
            -e "s|@VERSION@|${VERSION}|g" \
            -e "s|@SHA256@|${SHA}|g" \
            packaging/homebrew/izprime.rb.in > tap/Formula/izprime.rb

          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git diff --quiet -- Formula/izprime.rb; then
            echo "Formula already up to date."
            exit 0
          fi

          git add Formula/izprime.rb
          git commit -m "izprime ${VERSION}"
          git push origin HEAD:main
